services:
  - type: web
    name: restaurant-app
    runtime: node
    rootDir: client/restaurant
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: STORE_PATH
        value: /opt/render/project/src/client/restaurant/server/data/store.json
